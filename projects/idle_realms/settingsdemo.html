<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Realms · 物品与右键菜单</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-deep: #14100c; --bg-base: #1c1610; --bg-card: #2a2018; --bg-card-hi: #342821;
    --border: #4a3826; --border-hi: #6b4f33; --gold: #e6b566; --gold-hi: #f4cb7e; --gold-dim: #a07c3a;
    --text: #f0e4d0; --text-dim: #a89880; --text-faint: #6b5d4a;
    --success: #7cb342; --danger: #e53935; --magic: #b968e0;
    --rarity-common: #a89880; --rarity-uncommon: #7cb342; --rarity-rare: #5c9ce6; --rarity-epic: #b968e0;
  }
  html, body { height: 100%; font-family: 'Noto Sans SC', sans-serif; background: var(--bg-deep); color: var(--text); overflow: hidden; user-select: none; }
  body { background: radial-gradient(ellipse at top, #2a1f15 0%, transparent 60%), var(--bg-deep); display: flex; justify-content: center; padding: 40px; }
  
  .game-container { width: 100%; max-width: 900px; }
  h1 { font-family: 'Cinzel', serif; color: var(--gold-hi); font-size: 28px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  
  .top-stats { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat-chip { background: var(--bg-card); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .stat-chip i { color: var(--gold); }
  .stat-chip.equip i { color: var(--danger); }

  /* 物品网格 */
  .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  .item-card { 
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; 
    padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; 
    transition: all 0.15s; position: relative; 
  }
  .item-card:hover { border-color: var(--border-hi); background: var(--bg-card-hi); transform: translateY(-2px); }
  .item-card.equipped { border-color: var(--success); box-shadow: 0 0 8px rgba(124, 179, 66, 0.3); }
  .item-card.equipped::after { content: 'E'; position: absolute; top: 4px; right: 4px; background: var(--success); color: white; font-size: 10px; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-weight: 700; }
  
  .item-icon { font-size: 28px; margin-bottom: 8px; color: var(--text-dim); }
  .item-name { font-size: 12px; text-align: center; line-height: 1.2; }
  .item-qty { font-size: 11px; color: var(--gold); font-weight: 700; margin-top: 4px; }

  /* 右键菜单样式 */
  .context-menu {
    position: fixed; background: var(--bg-card); border: 1px solid var(--border-hi); 
    border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); 
    padding: 6px; z-index: 1000; min-width: 160px; display: none;
    animation: ctxIn 0.1s ease-out;
  }
  @keyframes ctxIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  .ctx-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s; }
  .ctx-item:hover { background: var(--bg-card-hi); color: var(--gold-hi); }
  .ctx-item i { width: 16px; text-align: center; color: var(--text-dim); }
  .ctx-item:hover i { color: var(--gold); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-item.danger:hover { background: var(--danger); color: white; }
  .ctx-item.danger:hover i { color: white; }
  .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* 物品详情弹窗 (扩展底蕴) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
  .modal-overlay.active { display: flex; }
  .examine-box { 
    background: var(--bg-card); border: 1px solid var(--gold-dim); border-radius: 12px; 
    padding: 32px; width: 100%; max-width: 420px; position: relative; 
    box-shadow: 0 0 40px rgba(230, 181, 102, 0.15);
  }
  .examine-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .examine-name { font-family: 'Cinzel', serif; font-size: 20px; text-align: center; margin-bottom: 8px; }
  .examine-type { text-align: center; font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
  .examine-desc { font-size: 14px; line-height: 1.6; color: var(--text-dim); background: var(--bg-base); padding: 16px; border-radius: 8px; border-left: 3px solid var(--gold-dim); font-style: italic; }
  .examine-stats { display: flex; justify-content: center; gap: 20px; margin-top: 16px; }
  .stat-pill { background: var(--bg-base); padding: 6px 12px; border-radius: 4px; font-size: 13px; }
  .stat-pill.atk { color: var(--danger); }
  .stat-pill.def { color: var(--magic); }
  .examine-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-faint); font-size: 18px; cursor: pointer; }

  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--bg-card); border: 1px solid var(--border-hi); border-left: 4px solid var(--gold); padding: 12px 20px; border-radius: 6px; color: var(--text); font-size: 13px; animation: toastIn 0.3s; }
  .toast.success { border-left-color: var(--success); }
  .toast.danger { border-left-color: var(--danger); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="game-container">
  <h1>背包与装备 (右键物品查看详情)</h1>
  <div class="top-stats">
    <div class="stat-chip"><i class="fa-solid fa-coins"></i> <span id="goldVal">150</span> 金币</div>
    <div class="stat-chip equip"><i class="fa-solid fa-shield-halved"></i> 防御力: <span id="defVal">0</span></div>
    <div class="stat-chip equip"><i class="fa-solid fa-gavel"></i> 攻击力: <span id="atkVal">1</span></div>
  </div>
  <div class="inv-grid" id="invGrid"></div>
</div>

<!-- 右键菜单容器 -->
<div class="context-menu" id="ctxMenu"></div>

<!-- 物品检查弹窗 -->
<div class="modal-overlay" id="examineModal">
  <div class="examine-box" id="examineBoxContent"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== 物品数据 (增加 desc 背景设定) ====================
const ITEMS = {
  logs: { name: '原木', icon: 'fa-tree', type: 'material', rarity: 'common', desc: '从普通树木上砍伐下的木材。虽然随处可见，但它是搭建领地帐篷与初级弓箭的基础材料。' },
  copper_ore: { name: '铜矿', icon: 'fa-gem', type: 'material', rarity: 'common', desc: '带有红褐色斑点的矿石。在火炉中熔炼后，能与锡融合成坚硬的青铜，是迈向铁器时代的第一步。' },
  herb: { name: '草药', icon: 'fa-leaf', type: 'material', rarity: 'uncommon', desc: '散发着微苦气味的药草。晒干后可入药，是初级生命药水的主要成分。' },
  cooked_shrimp: { name: '熟虾', icon: 'fa-bowl-food', type: 'food', rarity: 'common', heal: 5, desc: '在篝火上简单烤制的虾。虽然焦了一点，但比生吃好得多，能恢复少量生命值。' },
  iron_sword: { name: '精铁长剑', icon: 'fa-sword', type: 'weapon', atk: 10, rarity: 'uncommon', desc: '城镇铁匠铺批量锻造的武器。虽然缺乏魔法附魔，但胜在耐用且易于维护，是冒险者可靠的伙伴。' },
  steel_armor: { name: '精钢战甲', icon: 'fa-shirt', type: 'armor', def: 15, rarity: 'rare', desc: '由多层精钢片编织而成的重型护甲。穿在身上十分沉重，但能抵御狼人的撕咬和哥布林的劣质匕首。' },
  magic_amulet: { name: '微光护符', icon: 'fa-link', type: 'armor', def: 2, atk: 5, rarity: 'epic', desc: '散发着微弱蓝光的古老护符。据说曾是某位陨落法师的遗物，能微微增强佩戴者的精神力。' }
};

// ==================== 游戏状态 ====================
let state = {
  gold: 150,
  inventory: { logs: 45, copper_ore: 12, herb: 3, cooked_shrimp: 8, iron_sword: 1, steel_armor: 1, magic_amulet: 1 },
  equipment: { weapon: null, body: null, amulet: null },
  stats: { hp: 10, maxHp: 10 }
};

// ==================== 渲染逻辑 ====================
function render() {
  document.getElementById('goldVal').textContent = state.gold;
  document.getElementById('atkVal').textContent = getPlayerAtk();
  document.getElementById('defVal').textContent = getPlayerDef();

  const grid = document.getElementById('invGrid');
  grid.innerHTML = '';
  
  for (let id in state.inventory) {
    if (state.inventory[id] > 0) {
      const item = ITEMS[id];
      const isEquipped = Object.values(state.equipment).includes(id);
      const card = document.createElement('div');
      card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
      card.style.borderColor = isEquipped ? 'var(--success)' : `var(--rarity-${item.rarity})`; // 稀有度边框
      
      card.innerHTML = `
        <i class="fa-solid ${item.icon} item-icon" style="color:var(--rarity-${item.rarity})"></i>
        <div class="item-name">${item.name}</div>
        <div class="item-qty">x${state.inventory[id]}</div>
      `;

      // 左键：默认操作 (装备/食用)
      card.onclick = () => defaultAction(id);
      // 右键：呼出菜单
      card.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, id); };

      grid.appendChild(card);
    }
  }
}

function getPlayerAtk() {
  let atk = 1;
  if (state.equipment.weapon) atk += ITEMS[state.equipment.weapon].atk || 0;
  if (state.equipment.amulet) atk += ITEMS[state.equipment.amulet].atk || 0;
  return atk;
}
function getPlayerDef() {
  let def = 0;
  if (state.equipment.body) def += ITEMS[state.equipment.body].def || 0;
  if (state.equipment.amulet) def += ITEMS[state.equipment.amulet].def || 0;
  return def;
}

// ==================== 右键菜单逻辑 ====================
function showContextMenu(e, itemId) {
  const menu = document.getElementById('ctxMenu');
  const item = ITEMS[itemId];
  let html = '';

  // 根据物品类型生成菜单项
  html += `<div class="ctx-item" onclick="examineItem('${itemId}')"><i class="fa-solid fa-magnifying-glass"></i> 检查 (查看背景)</div>`;
  
  if (item.type === 'weapon' || item.type === 'armor') {
    const isEquipped = Object.values(state.equipment).includes(itemId);
    if (isEquipped) {
      html += `<div class="ctx-item" onclick="unequipItem('${itemId}')"><i class="fa-solid fa-shield-halved"></i> 卸下装备</div>`;
    } else {
      html += `<div class="ctx-item" onclick="equipItem('${itemId}')"><i class="fa-solid fa-shield-halved"></i> 装备</div>`;
    }
  } else if (item.type === 'food') {
    html += `<div class="ctx-item" onclick="eatFood('${itemId}')"><i class="fa-solid fa-utensils"></i> 食用 (恢复${item.heal}HP)</div>`;
  }

  html += `<div class="ctx-item" onclick="sellItem('${itemId}')"><i class="fa-solid fa-coins"></i> 出售 (5金)</div>`;
  html += `<div class="ctx-divider"></div>`;
  html += `<div class="ctx-item danger" onclick="dropItem('${itemId}')"><i class="fa-solid fa-trash"></i> 丢弃销毁</div>`;

  menu.innerHTML = html;
  
  // 定位菜单
  menu.style.display = 'block';
  const menuWidth = menu.offsetWidth;
  const menuHeight = menu.offsetHeight;
  let left = e.clientX;
  let top = e.clientY;
  
  // 防止超出屏幕边界
  if (left + menuWidth > window.innerWidth) left = window.innerWidth - menuWidth - 10;
  if (top + menuHeight > window.innerHeight) top = window.innerHeight - menuHeight - 10;
  
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
}

// 点击空白处关闭菜单
document.addEventListener('click', (e) => {
  const menu = document.getElementById('ctxMenu');
  if (!menu.contains(e.target)) menu.style.display = 'none';
});

// ==================== 物品操作逻辑 ====================
function defaultAction(id) {
  const item = ITEMS[id];
  if (item.type === 'weapon' || item.type === 'armor') {
    Object.values(state.equipment).includes(id) ? unequipItem(id) : equipItem(id);
  } else if (item.type === 'food') {
    eatFood(id);
  } else {
    examineItem(id); // 材料默认打开详情
  }
  document.getElementById('ctxMenu').style.display = 'none';
}

function examineItem(id) {
  const item = ITEMS[id];
  const box = document.getElementById('examineBoxContent');
  let statsHtml = '';
  if (item.atk) statsHtml += `<div class="stat-pill atk"><i class="fa-solid fa-gavel"></i> 攻击 +${item.atk}</div>`;
  if (item.def) statsHtml += `<div class="stat-pill def"><i class="fa-solid fa-shield-halved"></i> 防御 +${item.def}</div>`;
  if (item.heal) statsHtml += `<div class="stat-pill" style="color:var(--success)"><i class="fa-solid fa-heart"></i> 生命恢复 +${item.heal}</div>`;

  box.innerHTML = `
    <button class="examine-close" onclick="closeExamine()"><i class="fa-solid fa-times"></i></button>
    <div class="examine-icon" style="color:var(--rarity-${item.rarity})"><i class="fa-solid ${item.icon}"></i></div>
    <div class="examine-name" style="color:var(--rarity-${item.rarity})">${item.name}</div>
    <div class="examine-type">${item.type} · ${item.rarity}</div>
    <div class="examine-desc">"${item.desc}"</div>
    ${statsHtml ? `<div class="examine-stats">${statsHtml}</div>` : ''}
  `;
  document.getElementById('examineModal').classList.add('active');
  document.getElementById('ctxMenu').style.display = 'none';
}

function equipItem(id) {
  const item = ITEMS[id];
  const slot = item.type === 'weapon' ? 'weapon' : (item.type === 'armor' && ITEMS[id].def > 5 ? 'body' : 'amulet');
  // 简化逻辑：直接替换装备，旧装备回背包
  if (state.equipment[slot]) {
    toast(`卸下了 ${ITEMS[state.equipment[slot]].name}`);
  }
  state.equipment[slot] = id;
  toast(`装备了 ${item.name}`, 'success');
  render();
}

function unequipItem(id) {
  for (let slot in state.equipment) {
    if (state.equipment[slot] === id) state.equipment[slot] = null;
  }
  toast(`卸下了 ${ITEMS[id].name}`);
  render();
}

function eatFood(id) {
  if (state.stats.hp >= state.stats.maxHp) return toast('生命值已满', 'danger');
  state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + ITEMS[id].heal);
  state.inventory[id]--;
  if (state.inventory[id] <= 0) delete state.inventory[id];
  toast(`食用了 ${ITEMS[id].name}，恢复了 ${ITEMS[id].heal} 点生命`, 'success');
  render();
}

function sellItem(id) {
  state.gold += 5;
  state.inventory[id]--;
  if (state.inventory[id] <= 0) delete state.inventory[id];
  toast(`出售 ${ITEMS[id].name} 获得 5 金币`, 'success');
  render();
}

function dropItem(id) {
  state.inventory[id]--;
  if (state.inventory[id] <= 0) delete state.inventory[id];
  toast(`销毁了 ${ITEMS[id].name}`, 'danger');
  render();
}

// ==================== 辅助函数 ====================
function closeExamine() {
  document.getElementById('examineModal').classList.remove('active');
}
document.getElementById('examineModal').addEventListener('click', (e) => {
  if (e.target.id === 'examineModal') closeExamine();
});

function toast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// 初始化
render();
</script>
</body>
</html>
