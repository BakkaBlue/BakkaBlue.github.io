name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys so a newer run never cancels a waiting Pages job mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            projects/idle_realms/package-lock.json
            projects/explodemoji/package-lock.json

      - name: Install homepage dependencies
        run: npm ci

      - name: Build homepage
        run: npm run build

      - name: Install idle_realms dependencies
        run: npm ci
        working-directory: projects/idle_realms

      - name: Build idle_realms
        run: npm run build
        working-directory: projects/idle_realms

      - name: Install explodemoji dependencies
        run: npm ci
        working-directory: projects/explodemoji

      - name: Build explodemoji
        run: npm run build
        working-directory: projects/explodemoji

      - name: Assemble deploy directory
        run: |
          set -euo pipefail
          DEPLOY_DIR=_deploy
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # homepage
          cp -r dist/. "$DEPLOY_DIR/"

          # static projects
          cp -r color_wordle "$DEPLOY_DIR/color_wordle"
          cp -r laohei-music "$DEPLOY_DIR/laohei-music"

          # built apps
          mkdir -p "$DEPLOY_DIR/idle_realms" "$DEPLOY_DIR/explodemoji"
          cp -r projects/idle_realms/dist/. "$DEPLOY_DIR/idle_realms/"
          cp -r projects/explodemoji/dist/. "$DEPLOY_DIR/explodemoji/"

          # SPA fallback for client routes (/blog, /projects, ...)
          if [ -f "$DEPLOY_DIR/index.html" ]; then
            cp "$DEPLOY_DIR/index.html" "$DEPLOY_DIR/404.html"
          fi
          if [ -f public/404.html ]; then
            cp public/404.html "$DEPLOY_DIR/404.html"
          fi

          echo "=== deploy tree ==="
          find "$DEPLOY_DIR" -maxdepth 3 -type f | sort
          test -f "$DEPLOY_DIR/index.html"
          test -f "$DEPLOY_DIR/explodemoji/index.html"
          test -f "$DEPLOY_DIR/idle_realms/index.html"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
