name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ===== 构建主页 (Glassmorphism Vue 首页) =====
      - name: Install homepage dependencies
        run: npm ci

      - name: Build homepage
        run: npm run build

      # ===== 构建 idle_realms =====
      - name: Install idle_realms dependencies
        run: npm ci
        working-directory: projects/idle_realms

      - name: Build idle_realms
        run: npm run build
        working-directory: projects/idle_realms

      # ===== 构建 explodemoji =====
      - name: Install explodemoji dependencies
        run: npm ci
        working-directory: projects/explodemoji

      - name: Build explodemoji
        run: npm run build
        working-directory: projects/explodemoji

      # ===== 组装部署目录 =====
      - name: Assemble deploy directory
        run: |
          DEPLOY_DIR=_deploy
          mkdir -p "$DEPLOY_DIR"

          # 主页构建产物 → 根目录
          cp -r dist/* "$DEPLOY_DIR/"

          # 静态子项目直接复制
          cp -r color_wordle "$DEPLOY_DIR/color_wordle"
          cp -r laohei-music "$DEPLOY_DIR/laohei-music"

          # idle_realms 构建产物
          mkdir -p "$DEPLOY_DIR/idle_realms"
          cp -r projects/idle_realms/dist/* "$DEPLOY_DIR/idle_realms"

          # explodemoji 构建产物
          mkdir -p "$DEPLOY_DIR/explodemoji"
          cp -r projects/explodemoji/dist/* "$DEPLOY_DIR/explodemoji"

          echo "=== 部署目录结构 ==="
          find "$DEPLOY_DIR" -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
