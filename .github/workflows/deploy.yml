name: Build & Deploy Idle Realms

on:
  push:
    branches:
      - main
    paths:
      - "projects/idle_realms/**"
      - ".github/workflows/deploy-idle-realms.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/idle_realms

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/idle_realms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Clean deploy directory
        working-directory: .
        run: |
          rm -rf idle_realms
          mkdir idle_realms

      - name: Copy build output
        working-directory: .
        run: |
          cp -R projects/idle_realms/dist/. idle_realms/

      - name: Commit deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add idle_realms

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Deploy Idle Realms"

          git push